server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    config:
      enabled: false
    gateway:
      routes:
        - id: user-management-service
          uri: lb://USER-MANAGEMENT-SERVICE
          # Accept both v1 and non-v1 auth/user paths to match controllers
          predicates:
            - Path=/api/v1/auth/**,/api/v1/users/**,/api/auth/**,/api/users/**
          # Do not strip prefix for user-management so full path is forwarded
        - id: farmer-service
          uri: lb://FARMER-SERVICE
          predicates:
            - Path=/api/v1/farmers/**
          filters:
            - StripPrefix=2
        - id: retailer-service
          uri: lb://RETAILER-SERVICE
          predicates:
            - Path=/api/v1/retailers/**
          filters:
            - StripPrefix=2
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=2
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/orders/**
          # no strip prefix so order-service sees full path
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
  # security:
  #   user:
  #     name: admin
  #     password: admin123

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always


info:
  app:
    name: api-gateway
    description: API Gateway (no auth)
    version: 1.0.0

server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: user-management-service
  profiles:
    active: dev
  cloud:
    config:
      enabled: false
  config:
    import: optional:configserver:http://localhost:8888/
  
  datasource:
    url: jdbc:mysql://localhost:3306/agri_db
    username: root
    password: Akkathambi0414@
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    operationsSorter: method
  show-actuator: true

# URLs for downstream services used during registration
farmer.service.url: http://localhost:8082
retailer.service.url: http://localhost:8083

logging:
  level:
    root: INFO
    com.example.usermanagement: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"